<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI/UX Pro Max - Style Showcase</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f17;
  --surface: #1a1a2e;
  --surface-2: #232340;
  --surface-3: #2a2a4a;
  --text: #e8e8f0;
  --text-muted: #8888aa;
  --text-dim: #5a5a7a;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-glow: rgba(99,102,241,0.25);
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.04);
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --radius: 10px;
  --sidebar-w: 420px;
  --header-h: 56px;
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
  height: 100vh; overflow: hidden;
}

/* ===== HEADER ===== */
.header {
  height: var(--header-h); display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; border-bottom: 1px solid var(--border);
  background: linear-gradient(90deg, rgba(99,102,241,0.06) 0%, transparent 60%);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo {
  font-size: 18px; font-weight: 800;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-stats { display: flex; gap: 12px; }
.header-stat {
  font-size: 11px; color: var(--text-muted); padding: 4px 10px;
  background: var(--surface); border-radius: 99px; border: 1px solid var(--border);
}
.header-stat strong { color: var(--accent); }

/* ===== LAYOUT ===== */
.layout {
  display: flex; height: calc(100vh - var(--header-h));
}

/* ===== LEFT SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w); max-width: var(--sidebar-w);
  display: flex; flex-direction: column; border-right: 1px solid var(--border);
  background: var(--surface); overflow: hidden;
}
.sidebar-toolbar {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
}
.search-box { position: relative; }
.search-box input {
  width: 100%; padding: 9px 14px 9px 36px; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-size: 13px; outline: none; transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-dim); }
.search-box .search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  font-size: 13px; pointer-events: none; opacity: 0.5;
}
.filter-row {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.filter-btn {
  padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 500;
  background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.result-info {
  font-size: 11px; color: var(--text-dim); padding: 0 16px;
  padding-top: 8px; flex-shrink: 0;
}

/* Style list */
.style-list {
  flex: 1; overflow-y: auto; padding: 8px 0;
  scrollbar-width: thin; scrollbar-color: var(--surface-3) transparent;
}
.style-list::-webkit-scrollbar { width: 6px; }
.style-list::-webkit-scrollbar-track { background: transparent; }
.style-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

.style-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent;
  position: relative;
}
.style-item:hover { background: rgba(99,102,241,0.06); }
.style-item.active {
  background: rgba(99,102,241,0.1); border-left-color: var(--accent);
}
.style-item-color {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; border: 1px solid rgba(255,255,255,0.08);
}
.style-item-info { flex: 1; min-width: 0; }
.style-item-name {
  font-size: 13px; font-weight: 600; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.style-item-name .name-zh {
  color: var(--accent-hover); font-weight: 500; font-size: 12px;
}
.style-item-meta .kw-zh {
  font-size: 10px; color: var(--text-dim); max-width: 180px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: inline-block; vertical-align: middle;
}
.style-item-meta {
  font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; margin-top: 2px;
}
.style-item-meta .type-badge {
  padding: 1px 6px; border-radius: 99px; font-size: 10px; font-weight: 500;
}
.type-badge.general { background: rgba(99,102,241,0.15); color: #818cf8; }
.type-badge.landing { background: rgba(168,85,247,0.15); color: #c084fc; }
.type-badge.bi { background: rgba(34,197,94,0.15); color: #4ade80; }
.type-badge.mobile { background: rgba(234,179,8,0.15); color: #facc15; }

.style-item .go-btn {
  padding: 5px 14px; border-radius: 6px; font-size: 11px; font-weight: 600;
  background: var(--accent); border: none; color: #fff; cursor: pointer;
  opacity: 0; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
}
.style-item:hover .go-btn, .style-item.active .go-btn { opacity: 1; }
.style-item .go-btn:hover { background: var(--accent-hover); transform: scale(1.04); }
.style-item .go-btn:active { transform: scale(0.96); }

/* ===== RIGHT PREVIEW ===== */
.preview-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #111;
}
.preview-toolbar {
  height: 44px; display: flex; align-items: center; padding: 0 16px; gap: 12px;
  border-bottom: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0;
}
.preview-toolbar .vp-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.vp-btn-group { display: flex; gap: 4px; }
.vp-btn {
  padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 500;
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.vp-btn:hover { border-color: var(--accent); color: var(--text); }
.vp-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.preview-toolbar .preview-title {
  margin-left: auto; font-size: 12px; color: var(--text-dim);
  max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Preview iframe wrapper */
.preview-wrapper {
  flex: 1; display: flex; align-items: flex-start; justify-content: center;
  overflow: auto; padding: 16px;
  background:
    radial-gradient(circle at 20% 50%, rgba(99,102,241,0.03) 0%, transparent 50%),
    var(--bg);
}
.preview-frame {
  background: #fff; border-radius: 12px; overflow: hidden;
  box-shadow: 0 4px 40px rgba(0,0,0,0.4);
  transition: width 0.3s ease, max-width 0.3s ease;
  width: 100%; max-width: 100%; height: 100%;
  min-height: 500px;
}
.preview-frame.vp-1920 { max-width: 1920px; }
.preview-frame.vp-1440 { max-width: 1440px; }
.preview-frame.vp-1024 { max-width: 1024px; }
.preview-frame.vp-768 { max-width: 768px; }
.preview-frame.vp-375 { max-width: 375px; }
.preview-frame.vp-320 { max-width: 320px; }
.preview-frame iframe {
  width: 100%; height: 100%; min-height: 500px; border: none;
  display: block;
}

/* Empty preview */
.preview-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-dim); gap: 12px;
}
.preview-empty .icon { font-size: 48px; opacity: 0.3; }
.preview-empty h3 { font-size: 16px; color: var(--text-muted); font-weight: 500; }
.preview-empty p { font-size: 13px; max-width: 300px; text-align: center; line-height: 1.5; }

/* Loading spinner */
.preview-loading {
  display: none; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%); z-index: 5;
}
.preview-loading.show { display: block; }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .sidebar {
    width: 100%; min-width: 100%; max-width: 100%;
    height: 45vh; min-height: 200px;
    border-right: none; border-bottom: 1px solid var(--border);
  }
  .preview-panel { height: 55vh; }
  .preview-frame { min-height: 300px; }
  .preview-frame iframe { min-height: 300px; }
  .header-stats { display: none; }
  .style-item .go-btn { opacity: 1; }
}
@media (max-width: 480px) {
  .sidebar { height: 40vh; }
  .preview-panel { height: 60vh; }
  .filter-row { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
  .preview-toolbar { flex-wrap: wrap; height: auto; padding: 8px 12px; }
}
</style>

// ===== STATE =====
let currentFilter = 'general';
let currentSearch = '';
let selectedStyle = null;
let currentVp = 'full';

// ===== RENDER SIDEBAR LIST =====
function renderList() {
  const list = document.getElementById('styleList');
  const info = document.getElementById('resultInfo');

  const filtered = STYLES.filter(s => {
    const mf = s.type === currentFilter || s.tags.includes(currentFilter);
    const ms = !currentSearch || s.name.toLowerCase().includes(currentSearch) || s.era.toLowerCase().includes(currentSearch);
    return mf && ms;
  });

  info.textContent = filtered.length + ' style' + (filtered.length !== 1 ? 's' : '');

  list.innerHTML = filtered.map(s => {
    const isActive = selectedStyle && selectedStyle.id === s.id;
    const grad = s.colors.length >= 3
      ? `background:linear-gradient(135deg,${s.colors[0]},${s.colors[1]},${s.colors[2]})`
      : `background:${s.colors[0]}`;
    const textCol = ['#FFFFFF','#F5F5F7','#F5F5F5','#FFFFFF','#FDFBF7','#FAFAFA','#FAFAF8','#F4F1FA','#E8DFD4','#F5E6C8','#FFFDF5','#F0C020'].some(c => s.colors[0].toUpperCase() === c.toUpperCase())
      ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.9)';
    return `<div class="style-item ${isActive ? 'active' : ''}" data-id="${s.id}">
      <div class="style-item-color" style="${grad}">
        <span style="color:${textCol};font-size:11px">${s.id}</span>
      </div>
      <div class="style-item-info">
        <div class="style-item-name">${s.name} <span class="name-zh">（${s.nameZh}）</span></div>
        <div class="style-item-meta">
          <span class="type-badge ${s.type}">${s.type === 'bi' ? 'BI' : s.type}</span>
          <span>${s.era}</span>
        </div>
      </div>
      <button class="go-btn" onclick="event.stopPropagation();goToStyle(${s.id})">Open →</button>
    </div>`;
  }).join('');

  // Click to preview
  list.querySelectorAll('.style-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = parseInt(item.dataset.id);
      previewStyle(id);
    });
  });
}

// ===== PREVIEW =====
function previewStyle(id) {
  const style = STYLES.find(s => s.id === id);
  if (!style) return;
  selectedStyle = style;

  // Update active state in list
  document.querySelectorAll('.style-item').forEach(item => {
    item.classList.toggle('active', parseInt(item.dataset.id) === id);
  });

  // Show preview
  const empty = document.getElementById('previewEmpty');
  const frame = document.getElementById('previewFrame');
  const loading = document.getElementById('previewLoading');
  const title = document.getElementById('previewTitle');
  const iframe = document.getElementById('previewIframe');

  empty.style.display = 'none';
  frame.style.display = '';
  loading.classList.add('show');
  title.textContent = '#' + style.id + ' ' + style.name;

  iframe.src = style.file;

  // Scroll active item into view
  const activeItem = document.querySelector('.style-item.active');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function onIframeLoad() {
  document.getElementById('previewLoading').classList.remove('show');
}

// ===== NAVIGATE TO FULL PAGE =====
function goToStyle(id) {
  const style = STYLES.find(s => s.id === id);
  if (style) window.location.href = style.file;
}

// ===== VIEWPORT SWITCHER =====
document.getElementById('vpBtns').addEventListener('click', (e) => {
  const btn = e.target.closest('.vp-btn');
  if (!btn) return;
  document.querySelectorAll('.vp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentVp = btn.dataset.size;
  const frame = document.getElementById('previewFrame');
  frame.className = 'preview-frame';
  if (currentVp !== 'full') frame.classList.add('vp-' + currentVp);
});

// ===== FILTER =====
document.getElementById('filterRow').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderList();
});

// ===== SEARCH =====
document.getElementById('search').addEventListener('input', (e) => {
  currentSearch = e.target.value.toLowerCase().trim();
  renderList();
});

// ===== INIT =====
renderList();
</script>
